<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Unlocked — Commission Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c0f;--surface:#111318;--surface2:#181c23;--border:#1e2330;--border2:#252c3a;
    --accent:#4f8ef7;--accent2:#2563eb;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
    --text:#e8ecf4;--text2:#8b95a8;--text3:#535c6e;
    --mono:'IBM Plex Mono',monospace;--sans:'DM Sans',sans-serif;--sidebar-w:220px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px}
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse at 20% 50%,rgba(79,142,247,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(34,197,94,.04) 0%,transparent 50%);padding:20px}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .login-logo{font-family:var(--mono);font-size:11px;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;margin-bottom:24px}
  .login-title{font-size:22px;font-weight:600;margin-bottom:6px}
  .login-sub{color:var(--text2);font-size:13px;margin-bottom:24px}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:10px 13px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
  .form-group textarea{resize:vertical;min-height:80px}
  .form-group select option{background:var(--surface2)}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:7px;border:none;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
  .btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25)}.btn-danger:hover{background:rgba(239,68,68,.25)}
  .btn-success{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.25)}.btn-success:hover{background:rgba(34,197,94,.25)}
  .btn-sm{padding:6px 12px;font-size:12px}
  .btn-full{width:100%;justify-content:center}
  .btn-ghost{background:none;border:1px solid var(--border2);color:var(--text2)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-ghost.active{background:rgba(79,142,247,.12);border-color:var(--accent);color:var(--accent)}
  .error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:7px;color:var(--red);padding:10px 13px;font-size:13px;margin-bottom:16px;display:none}
  #app{display:none;min-height:100vh}
  .topbar{display:none;position:fixed;top:0;left:0;right:0;height:54px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;justify-content:space-between;padding:0 16px;z-index:200}
  .topbar-logo{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--accent);text-transform:uppercase}
  .hamburger{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px 8px;line-height:1}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:149}
  .sidebar-overlay.open{display:block}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:150;transition:transform .25s ease}
  .sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
  .sidebar-logo-text{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--accent);text-transform:uppercase}
  .sidebar-logo-sub{font-size:11px;color:var(--text3);margin-top:3px}
  .sidebar-nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;user-select:none}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:rgba(79,142,247,.12);color:var(--accent)}
  .nav-icon{font-size:15px;width:18px;text-align:center}
  .sidebar-footer{padding:14px 10px;border-top:1px solid var(--border)}
  .user-pill{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;cursor:pointer}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
  .user-name{font-size:13px;font-weight:500}
  .user-role{font-size:11px;color:var(--text3)}
  .main{margin-left:var(--sidebar-w);padding:28px 32px;min-height:100vh}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
  .page-title{font-size:20px;font-weight:600}
  .page-sub{color:var(--text2);font-size:13px;margin-top:3px}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
  .stat-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
  .stat-value{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--text);line-height:1}
  .stat-value.green{color:var(--green)}.stat-value.blue{color:var(--accent)}.stat-value.yellow{color:var(--yellow)}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:6px}
  .tier-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono)}
  .tier-10{background:rgba(83,92,110,.2);color:var(--text2);border:1px solid var(--border2)}
  .tier-11{background:rgba(79,142,247,.15);color:var(--accent);border:1px solid rgba(79,142,247,.3)}
  .tier-12{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3)}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
  .table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
  .table-title{font-size:14px;font-weight:600}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;min-width:480px}
  th{text-align:left;padding:11px 16px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2)}
  td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.015)}
  .status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
  .status-pending{background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
  .status-approved{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
  .status-rejected{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
  .status-paid{background:rgba(79,142,247,.12);color:var(--accent);border:1px solid rgba(79,142,247,.25)}
  .status-unpaid{background:rgba(83,92,110,.15);color:var(--text2);border:1px solid var(--border2)}
  .mono{font-family:var(--mono)}.green{color:var(--green)}.yellow{color:var(--yellow)}
  .actions-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

  /* DATE FILTER BAR */
  .filter-bar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface2);flex-wrap:wrap}
  .filter-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-right:4px;white-space:nowrap}
  .filter-quick{display:flex;gap:6px;flex-wrap:wrap}
  .filter-divider{width:1px;height:20px;background:var(--border2);margin:0 4px}
  .filter-dates{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .filter-dates input[type=date]{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;transition:border-color .15s;cursor:pointer}
  .filter-dates input[type=date]:focus{border-color:var(--accent)}
  .filter-sep{font-size:12px;color:var(--text3)}
  .filter-summary{font-size:12px;color:var(--text2);margin-left:auto;white-space:nowrap}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.6)}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:16px;font-weight:600}
  .modal-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color .15s}
  .modal-close:hover{color:var(--text)}
  .modal-body{padding:20px 24px}
  .modal-footer{padding:14px 24px 20px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  #toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:12px 18px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;transform:translateY(80px);opacity:0;transition:all .25s;max-width:300px}
  #toast.show{transform:translateY(0);opacity:1}
  #toast.success{border-color:rgba(34,197,94,.4);color:var(--green)}
  #toast.error{border-color:rgba(239,68,68,.4);color:var(--red)}
  .loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3)}
  .empty-state{text-align:center;padding:40px;color:var(--text3)}
  .tier-progress-wrap{margin-bottom:20px}
  .tier-progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px;flex-wrap:wrap;gap:4px}
  .tier-progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .tier-progress-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s}
  .rep-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .rep-info{flex:1;min-width:120px}
  .rep-name{font-weight:600;font-size:14px}
  .rep-meta{font-size:12px;color:var(--text2);margin-top:3px}
  .inline-row{display:flex;gap:10px}
  .inline-row .form-group{flex:1}
  .no-wrap{white-space:nowrap}
  .highlight-row td{background:rgba(245,158,11,.03)}
  .est-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-family:var(--mono);background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
  .est-preview{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:7px;padding:10px 14px;margin:-4px 0 16px;font-size:13px;color:var(--yellow)}
  @media(max-width:768px){
    .topbar{display:flex}
    .sidebar{transform:translateX(-100%);top:0}
    .sidebar.open{transform:translateX(0)}
    .main{margin-left:0;padding:74px 16px 24px}
    .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px}
    .stat-value{font-size:18px}
    .page-header{margin-bottom:16px}
    .inline-row{flex-direction:column;gap:0}
    .actions-row .btn-sm{padding:5px 8px;font-size:11px}
    #toast{bottom:16px;right:16px;left:16px;max-width:none}
    .modal-footer{justify-content:stretch}
    .modal-footer .btn{flex:1;justify-content:center}
    .filter-bar{gap:6px}
    .filter-divider{display:none}
    .filter-summary{margin-left:0;width:100%}
  }
  @media(max-width:420px){.login-card{padding:28px 20px}}

  /* HELP PAGE */
  .help-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;gap:16px;align-items:flex-start}
  .help-step{width:28px;height:28px;border-radius:50%;background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:var(--accent);font-family:var(--mono);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
  .help-body{flex:1}
  .help-title{font-size:15px;font-weight:600;margin-bottom:6px}
  .help-text{font-size:13px;color:var(--text2);line-height:1.6}
  .tier-info-card{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;min-width:120px}
  .tier-info-label{font-size:12px;color:var(--text2);margin-top:6px}
  .tier-info-sub{font-size:11px;color:var(--green);margin-top:2px;font-family:var(--mono)}
  /* ONBOARDING */
  #onboarding-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
  .ob-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:420px;padding:32px;box-shadow:0 32px 80px rgba(0,0,0,.6);text-align:center}
  .ob-icon{font-size:36px;margin-bottom:16px;line-height:1}
  .ob-title{font-size:20px;font-weight:600;margin-bottom:10px}
  .ob-body{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:24px}
  .ob-progress{display:flex;gap:6px;justify-content:center;margin-bottom:24px}
  .ob-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all .2s}
  .ob-dot.active{background:var(--accent);width:20px;border-radius:4px}
  .ob-dot.done{background:var(--accent2)}
  .ob-actions{display:flex;gap:10px;justify-content:center}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Capital Unlocked</div>
    <div class="login-title">Commission Tracker</div>
    <div class="login-sub">Sign in to your account</div>
    <div class="error-msg" id="login-error"></div>
    <div class="form-group"><label>Name</label><input type="text" id="login-name" placeholder="Your name" autocomplete="off" autocapitalize="words"></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="Password"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Capital Unlocked</div>
    <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">Capital Unlocked</div>
      <div class="sidebar-logo-sub">Commission Tracker</div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="user-pill" onclick="doLogout()">
        <div class="user-avatar" id="user-avatar">N</div>
        <div><div class="user-name" id="user-name-display">Nick</div><div class="user-role" id="user-role-display">Admin</div></div>
      </div>
    </div>
  </div>
  <div class="main" id="main-content"><div class="loading">Loading...</div></div>
</div>


  <!-- ONBOARDING OVERLAY -->
  <div id="onboarding-overlay">
    <div class="ob-card">
      <div class="ob-icon" id="ob-icon"></div>
      <div class="ob-title" id="ob-title"></div>
      <div class="ob-body" id="ob-body"></div>
      <div class="ob-progress" id="ob-progress"></div>
      <div class="ob-actions">
        <button id="ob-back" class="btn btn-secondary" style="display:none" onclick="window._obBack()">&#8592; Back</button>
        <button id="ob-btn" class="btn btn-primary" style="min-width:120px">Next</button>
      </div>
    </div>
  </div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Modal</div>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL='https://lscrssgznfagxucxjtrk.supabase.co';
const SUPABASE_KEY='sb_publishable_xQro9Ai5jbYfcGyQPHdwXA_g5GfteYL';
const ADMIN_PASSWORD='CU-Admin-2025!';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);
let currentUser=null,currentPage='dashboard';

// active filter state per page
const filterState={
  'all-sales':{from:'',to:'',preset:'month'},
  'pending':{from:'',to:'',preset:'all'},
  'my-sales':{from:'',to:'',preset:'month'},
};

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('open')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open')}

// ---- DATE HELPERS ----
function monthRange(offset){
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth()+offset;
  const d=new Date(y,m,1);
  const from=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
  const last=new Date(d.getFullYear(),d.getMonth()+1,0);
  const to=`${last.getFullYear()}-${String(last.getMonth()+1).padStart(2,'0')}-${String(last.getDate()).padStart(2,'0')}`;
  return{from,to};
}
function monthLabel(offset){
  const now=new Date();const d=new Date(now.getFullYear(),now.getMonth()+offset,1);
  return d.toLocaleString('en-US',{month:'short',year:'numeric'});
}
function applyPreset(page,preset){
  const s=filterState[page];
  s.preset=preset;
  if(preset==='all'){s.from='';s.to=''}
  else if(preset==='month'){const r=monthRange(0);s.from=r.from;s.to=r.to}
  else if(preset==='last'){const r=monthRange(-1);s.from=r.from;s.to=r.to}
  else if(preset==='ytd'){const now=new Date();s.from=`${now.getFullYear()}-01-01`;s.to=new Date().toISOString().slice(0,10)}
  refreshFilteredTable(page);
  updateFilterUI(page);
}
function applyCustomDate(page){
  const from=document.getElementById(`filter-from-${page}`).value;
  const to=document.getElementById(`filter-to-${page}`).value;
  filterState[page].from=from;filterState[page].to=to;filterState[page].preset='custom';
  refreshFilteredTable(page);updateFilterUI(page);
}
function updateFilterUI(page){
  const s=filterState[page];
  ['all','month','last','ytd','custom'].forEach(p=>{
    const el=document.getElementById(`preset-${p}-${page}`);
    if(el)el.classList.toggle('active',s.preset===p);
  });
  const sum=document.getElementById(`filter-summary-${page}`);
  if(sum){
    if(!s.from&&!s.to)sum.textContent='Showing all time';
    else sum.textContent=`${s.from||'start'} to ${s.to||'today'}`;
  }
}
function filterBarHTML(page){
  const s=filterState[page];
  const pid=page;
  return`<div class="filter-bar">
    <span class="filter-label">Filter</span>
    <div class="filter-quick">
      <button id="preset-all-${pid}" class="btn btn-ghost btn-sm ${s.preset==='all'?'active':''}" onclick="applyPreset('${pid}','all')">All Time</button>
      <button id="preset-month-${pid}" class="btn btn-ghost btn-sm ${s.preset==='month'?'active':''}" onclick="applyPreset('${pid}','month')">${monthLabel(0)}</button>

// ---- AUTH ----
async function doLogin(){
  const name=document.getElementById('login-name').value.trim();
  const pass=document.getElementById('login-pass').value.trim();
  const err=document.getElementById('login-error');
  err.style.display='none';
  if(!name||!pass){showErr(err,'Enter name and password.');return}
  if(pass===ADMIN_PASSWORD){currentUser={id:null,name:name||'Admin',role:'admin'};launchApp();return}
  const{data,error}=await db.from('reps').select('*').ilike('name',name).single();
  if(error||!data){showErr(err,'Rep not found.');return}
  if(data.password!==pass){showErr(err,'Wrong password.');return}
  currentUser={id:data.id,name:data.name,role:'rep',tier:data.tier||10,monthly_volume:data.monthly_volume||0};
  launchApp();
}
function showErr(el,msg){el.textContent=msg;el.style.display='block'}
function doLogout(){currentUser=null;document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('login-pass').value='';closeSidebar()}
function launchApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-name-display').textContent=currentUser.name;
  document.getElementById('user-role-display').textContent=currentUser.role==='admin'?'Administrator':'Sales Rep';
  document.getElementById('user-avatar').textContent=currentUser.name.charAt(0).toUpperCase();
  buildNav();navigate('dashboard');if(currentUser.role==='rep'){const seen=localStorage.getItem('cu_onboarded_'+currentUser.id);if(!seen){setTimeout(()=>showOnboarding(),400);}}

function buildNav(){

// ---- TIER LOGIC ----
function getTier(v){return v>=200000?12:v>=100000?11:10}
function commRate(t){return t/100}
function getBonus(t){return t===12?2000:t===11?1000:0}
function tierProgress(v){
  if(v>=200000)return{pct:100,next:null,needed:0,label:'Gold — Max Tier (12%)'};
  if(v>=100000)return{pct:((v-100000)/100000)*100,next:200000,needed:200000-v,label:'Silver — $200K unlocks 12%'};
  return{pct:(v/100000)*100,next:100000,needed:100000-v,label:'Standard — $100K unlocks 11%'};
}

function commCell(sale,repTier){
  if(sale.status==='approved')return`<span class="green mono">${fmt(sale.commission)}</span>`;

  return'<span style="color:var(--text3)">&#8212;</span>';
}

function renderMySalesRows(sales,tier){

// ---- ACTIONS ----
async function submitSale(tier){
  const client=document.getElementById('new-client').value.trim();
  const amount=parseFloat(document.getElementById('new-amount').value);
  const date=document.getElementById('new-date').value;
  const notes=document.getElementById('new-notes').value.trim();
  if(!client||!amount||!date){toast('Fill in all required fields.','error');return}
  const{error}=await db.from('sales').insert({rep_id:currentUser.id,client_name:client,amount,sale_date:date,notes,tier,commission:amount*commRate(tier),status:'pending'});
  if(error){toast('Error: '+error.message,'error');return}
  toast('Sale submitted for approval.','success');navigate('my-sales');
}
async function approveSale(id){
  const{data:sale}=await db.from('sales').select('*, reps(tier)').eq('id',id).single();
  if(!sale)return;
  const tier=sale.reps?.tier||sale.tier||10;
  const commission=(sale.amount||0)*commRate(tier);
  await db.from('sales').update({status:'approved',tier,commission}).eq('id',id);
  await recalcRepTier(sale.rep_id);
  toast('Sale approved.','success');navigate(currentPage);
}
async function rejectSale(id){await db.from('sales').update({status:'rejected'}).eq('id',id);toast('Sale rejected.','success');navigate(currentPage)}
async function deleteSale(id){if(!confirm('Delete this sale permanently?'))return;await db.from('sales').delete().eq('id',id);toast('Deleted.','success');navigate(currentPage)}
async function recalcRepTier(repId){
  const now=new Date();const start=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
  const{data:sales}=await db.from('sales').select('amount').eq('rep_id',repId).eq('status','approved').gte('sale_date',start);
  const monthly=(sales||[]).reduce((a,b)=>a+(b.amount||0),0);
  const newTier=getTier(monthly);
  const{data:rep}=await db.from('reps').select('tier').eq('id',repId).single();
  const cur=rep?.tier||10;
  if(newTier>cur){await db.from('reps').update({tier:newTier,monthly_volume:monthly}).eq('id',repId)}
  else{await db.from('reps').update({monthly_volume:monthly}).eq('id',repId)}
}
async function markPaid(id){await db.from('payouts').update({status:'paid',paid_at:new Date().toISOString()}).eq('id',id);toast('Marked as paid.','success');navigate('payouts')}

  [{label:'Cancel',fn:closeModal,cls:'btn-secondary'},{label:'Save',fn:()=>doEditSale(id),cls:'btn-primary'}]);

  const client=document.getElementById('m-client').value.trim();const amount=parseFloat(document.getElementById('m-amount').value);const date=document.getElementById('m-date').value;const tier=parseInt(document.getElementById('m-tier').value);const status=document.getElementById('m-status').value;const notes=document.getElementById('m-notes').value.trim();
  await db.from('sales').update({client_name:client,amount,sale_date:date,tier,status,notes,commission:amount*commRate(tier)}).eq('id',id);
  closeModal();toast('Sale updated.','success');navigate(currentPage);
}
async function generatePayoutsModal(){
  const now=new Date();const period=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  openModal('Generate Payouts',`<p style="color:var(--text2);font-size:13px;margin-bottom:16px">Calculates commissions + bonuses for all approved sales in the selected period.</p><div class="form-group"><label>Period (YYYY-MM)</label><input type="text" id="m-period" value="${period}" placeholder="2025-03"></div><p style="font-size:12px;color:var(--text3)">Existing records for this period are skipped.</p>`,
  [{label:'Cancel',fn:closeModal,cls:'btn-secondary'},{label:'Generate',fn:doGeneratePayouts,cls:'btn-primary'}]);
}
async function doGeneratePayouts(){
  const period=document.getElementById('m-period').value.trim();if(!period)return;
  const[yr,mo]=period.split('-');const start=`${yr}-${mo}-01`;const end=new Date(parseInt(yr),parseInt(mo),0).toISOString().slice(0,10);
  const{data:reps}=await db.from('reps').select('*');let created=0;
  for(const rep of reps){
    const{data:existing}=await db.from('payouts').select('id').eq('rep_id',rep.id).eq('period',period);
    if(existing&&existing.length>0)continue;
    const{data:sales}=await db.from('sales').select('*').eq('rep_id',rep.id).eq('status','approved').gte('sale_date',start).lte('sale_date',end);
    if(!sales||!sales.length)continue;
    const volume=sales.reduce((a,b)=>a+(b.amount||0),0);const commission=sales.reduce((a,b)=>a+(b.commission||0),0);const tier=rep.tier||getTier(volume);const bonus=getBonus(tier);
    await db.from('payouts').insert({rep_id:rep.id,period,volume,commission,bonus,amount:commission+bonus,status:'unpaid'});created++;
  }
  closeModal();toast(`Generated ${created} payout record(s).`,'success');navigate('payouts');
}

async function exportCSVFiltered(){

  if(s.from)q=q.gte('sale_date',s.from);

  const rows=[['Date','Rep','Client','Amount','Tier','Commission','Status']];
  (sales||[]).forEach(s=>rows.push([s.sale_date||'',s.reps?.name||'',s.client_name||'',s.amount||0,s.tier||10,s.commission||0,s.status||'']));
  dlCSV(rows,`sales-${filterState['all-sales'].from||'all'}-to-${filterState['all-sales'].to||'today'}.csv`);

async function exportPayoutsCSV(){
  const{data:payouts}=await db.from('payouts').select('*, reps(name)').order('created_at',{ascending:false});
  const rows=[['Rep','Period','Volume','Commission','Bonus','Total','Status']];
  (payouts||[]).forEach(p=>rows.push([p.reps?.name||'',p.period||'',p.volume||0,p.commission||0,p.bonus||0,p.amount||0,p.status||'']));
  dlCSV(rows,'payouts-export.csv');
}
function dlCSV(rows,filename){
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=filename;a.click();
}

// ---- HELPERS ----
function fmt(n){if(!n&&n!==0)return'$0';return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}
function tierBadge(t){const l={10:'10%',11:'11%',12:'12%'};const c={10:'tier-10',11:'tier-11',12:'tier-12'};return`<span class="tier-badge ${c[t]||'tier-10'}">${l[t]||t+'%'}</span>`}
function statusBadge(s){const m={pending:['status-pending','&#9675; Pending'],approved:['status-approved','&#10003; Approved'],rejected:['status-rejected','&#10005; Rejected'],paid:['status-paid','&#10003; Paid'],unpaid:['status-unpaid','&#9675; Unpaid']};const[c,l]=m[s]||['status-pending',s];return`<span class="status-badge ${c}">${l}</span>`}

function openModal(title,body,buttons){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=buttons.map((b,i)=>`<button class="btn ${b.cls}" onclick="modalBtns[${i}]()">${b.label}</button>`).join('');
  window.modalBtns=buttons.map(b=>b.fn);
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}

let toastTimer;
function toast(msg,type='success'){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+type;clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.className='',3000)}

document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal()});

// ---- ONBOARDING MODAL ----
function showOnboarding(){
  const steps=[
    {icon:'&#9673;',title:'Log every sale',body:'After you close a deal, go to <b>Log a Sale</b> in the sidebar. Enter the client, amount, and date. Takes 30 seconds. Admin reviews and approves it.'},
    {icon:'&#128204;',title:'Watch your tier climb',body:'You start at 10% commission. Hit $100K in approved monthly volume and you unlock 11% permanently, plus a $1,000 bonus. Hit $200K and it\'s 12% with a $2,000 bonus.'},
    {icon:'&#128179;',title:'Get paid on the 5th',body:'Commissions are calculated from your approved sales each month. Check <b>My Payouts</b> to see what\'s coming. Paid out on the 5th.'},
    {icon:'&#10003;',title:'You\'re all set',body:'Dashboard shows your progress. My Sales lets you filter by date. If you ever have questions, hit the <b>How It Works</b> tab in the sidebar.'},
  ];
  let step=0;
  function renderStep(){
    const s=steps[step];
    const isLast=step===steps.length-1;
    document.getElementById('ob-icon').innerHTML=s.icon;
    document.getElementById('ob-title').textContent=s.title;
    document.getElementById('ob-body').innerHTML=s.body;
    document.getElementById('ob-progress').innerHTML=steps.map((_,i)=>`<div class="ob-dot ${i===step?'active':i<step?'done':''}"></div>`).join('');
    document.getElementById('ob-btn').textContent=isLast?'Got it, let\'s go':'Next';
    document.getElementById('ob-btn').onclick=isLast?dismissOnboarding:()=>{step++;renderStep();};
    if(step>0){document.getElementById('ob-back').style.display='inline-flex';}
    else{document.getElementById('ob-back').style.display='none';}
  }
  function dismissOnboarding(){
    localStorage.setItem('cu_onboarded_'+currentUser.id,'1');
    document.getElementById('onboarding-overlay').style.display='none';
  }
  document.getElementById('onboarding-overlay').style.display='flex';
  renderStep();
  window._obBack=()=>{if(step>0){step--;renderStep();}};
}
